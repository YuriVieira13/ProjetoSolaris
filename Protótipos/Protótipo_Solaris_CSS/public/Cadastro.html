<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="icon" href="assets/icons" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <script src="validacaoCredenciais.js"></script>
</head>

<body>

    <!-- Início Header -->

    <div class="header">
        <div class="titulo">Solaris</div>
        <ul class="navbar">
            <li class="sumario">
                <a href="#">Home</a>
            </li>
            <li>
                <a href="Grafico.html">Gráfico</a>
            </li>
            <li>
                <a href="Avalicao.html">Avaliação</a>
            </li>
            <li>
                <a href="Contato.html">Contato</a>
            </li>
            </li>
            <li>
                <a href="Login.html">Login</a>
            </li>
        </ul>
    </div>

    <!-- Fim Header -->

    <!-- Início Cadastro -->

    <div class="login">
        <div class="card card-cadastro">
            <h2>Bem-vindo!</h2>
            <div class="formulario">
            </div>
            <div class="campo">
                <span>Nome:</span>
                <input id="nome_input" type="text" placeholder="Seu nome"/>
                <p id="div_verificarNome"></p>
            </div>
            <div class="campo">
                <span>E-mail:</span>
                <input id="email_input" type="text" placeholder="meuemail@provedor.com" oninput="validarEmail()"/>
                <p id="div_verificarEmail"></p>
            </div>
            <div class="campo">
                <span>Senha:</span>
                <input id="senha_input" type="password" placeholder="******" />
                <p id="div_verificarSenha"></p>
            </div>
            <div class="campo">
                <span>Confirmação da Senha:</span>
                <input id="confirmacao_senha_input" type="password" placeholder="******" />
                <p id="div_verificarConfirmacao"></p>
            </div>
            <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div class="mensagem"> Já possui uma conta? <a href="Login.html" class="link-login">Faça login!</a>

        </div>

    </div>

    <!-- Fim Cadastro -->
</body>
</html>
