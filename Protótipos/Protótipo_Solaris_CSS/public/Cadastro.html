<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="icon" href="assets/icons" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <script src="validacaoCredenciais.js"></script>
</head>

<body>

    <!-- Início Header -->
    <div class="cadastro-fundo">
        <div class="header">
            <div class="titulo">Solaris</div>
            <ul class="navbar">
                <li class="sumario">
                    <a href="Home.html">Home</a>
                </li>
                <li>
                    <a href="Grafico.html">Gráfico</a>
                </li>
                <li>
                    <a href="Avalicao.html">Avaliação</a>
                </li>
                <li>
                    <a href="Contato.html">Contato</a>
                </li>
                </li>
                <li class="agora">
                    <a href="Login.html">Login</a>
                </li>
                </li>
            </ul>
        </div>

        <!-- Fim Header -->

        <!-- Início Cadastro -->

        <div class="login">
            <div class="card-card-cadastro">
                <h2>Bem-vindo!</h2>
                <div class="formulario">
                </div>
                <div class="campo">
                    <div class="linha-esquerda">
                        <span>Nome:</span>
                    </div>
                    <input id="nome_input" type="text" placeholder="Seu nome" oninput="verificarNome()"/>
                    <p id="div_verificarNome"></p>
                </div>
                <div class="campo">
                    <div class="linha-esquerda">
                        <span>E-mail:</span>
                    </div>
                    <input id="email_input" type="text" placeholder="meuemail@provedor.com" oninput="validarEmail()" />
                    <p id="div_verificarEmail"></p>
                </div>
                <div class="campo">
                    <div class="linha-esquerda">
                        <span>Senha:</span>
                    </div>
                    <input id="senha_input" type="password" placeholder="******" oninput="verificarSenha()"/>
                    <p id="div_verificarSenha"></p>
                </div>
                <div class="campo">
                    <div class="linha-esquerda">
                        <span>Confirmação da Senha:</span>
                    </div>
                    <input id="confirmacao_senha_input" type="password" placeholder="******" oninput="confirmacaoDeSenha()" />
                    <p id="div_verificarConfirmacao"></p>
                </div>
                <button class="botao-Cadastrar" onclick="cadastrar()">CADASTRAR</button>
                <div class="mensagem"> Já possui uma conta? <a href="Login.html" class="link-login">Faça login!</a>
                </div>

            </div>

        </div>
    </div>
    <!-- Fim Cadastro -->
</body>

</html>
