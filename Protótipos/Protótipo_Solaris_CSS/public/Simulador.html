<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Solaris</title>
    <link href="../public/styles/style_calculadora.css" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/codec-pro" rel="stylesheet">

</head>

<body>
    <div class="header" id="header">

        <img src="asstes/imgs/Solaris - logotipo(sem fundo).png" alt="Logotipo SOLARIS">

        <ul class="navbar">
            <li class="sumario">
                <a href="Home.html">Home</a>
            </li>
            <li class="sumario">
                <a href="Home.html#sobre">Sobre</a>
            </li>
            <li>
                <a href="Home.html#solucoes">Soluções</a>
            </li>
            <li>
                <a href="Home.html#servicos">Serviços</a>
            </li>
            <li>
                <a href="Home.html#diferencial">Diferencial</a>
            </li>
            <li>
                <a href="Home.html#footer">Contato</a>
            </li>
            <li>
                <a href="Simulador.html">Simulador</a>
            </li>
            <li class="login">
                <a href="Login.html">
                    <button>Login</button>
                </a>
            </li>
        </ul>

    </div>

    <div class="container">
        <div class="card">
            <h1>Simulador Solaris</h1>

            <h2>Tamanho da Área (Hectares)*</h2>
            <input type="number" id="ipt_area">

            <h2>Sua Produtividade Atual (Sacas por Hectare)*</h2>
            <input type="number" id="ipt_sacas">

            <h2>Preço de venda da Soja (R$/Saca)*</h2>
            <input type="number" id="ipt_preco">

            <button class="simular" onclick="verFaturamento()">SIMULE</button>

            <button class="limpar" onclick="limparCampos()">Limpar Simulação</button>

            <div id="div_mensagem"></div>
        </div>
    </div>

</body>

</html>

<script>

    function verFaturamento() {

        let area = Number(ipt_area.value)
        let produtividade = Number(ipt_sacas.value)
        let preco = Number(ipt_preco.value)
        let mensagem = ''

        if (!area || !produtividade || !preco) {
            alert(`Por favor, preencha todos os campos corretamente.`)
        } else {

            let producaoAtual = area * produtividade
            let receitaAtual = producaoAtual * preco

            let ganhoDeSacas = producaoAtual * 0.13
            let producaoSolaris = producaoAtual + ganhoDeSacas
            let receitaSolaris = producaoSolaris * preco

            let incrementoNaReceita = receitaSolaris - receitaAtual

            mensagem = `
                <div class="resultado">

                    <h3>Sem Solaris</h3>
                    <p>Produção por Área: ${Math.floor(producaoAtual)} sacas</p>
                    <p>Receita: R$ ${receitaAtual.toFixed(2).replace('.', ',')}</p>

                    <br>

                    <h3>Com Solaris</h3>
                    <p>Produção Estimada por Área: ${Math.floor(producaoSolaris)} sacas (+13%)</p>
                    <p>Receita: R$ ${receitaSolaris.toFixed(2).replace('.', ',')}</p>

                    <br>

                    <h2 class="ganho">Ganho em Receita: R$ ${incrementoNaReceita.toFixed(2).replace('.', ',')}</h2>
                     <p class="fontes">
                        <br>
                        <b> O manejo da luz otimizado, pode elevar a produção de soja em até 13%! </b>
                        <br><br>
                        <b>Fontes:</b>
                        <a href="https://ripe.illinois.edu/news/study-shines-light-full-potential-soybeans" target="_blank" class="link-fontes">1. RIPE - Study shines light on full potential of soybeans</a><br>
                        <a href="https://agriculture.basf.com/br/pt/conteudos/cultivos-e-sementes/soja/fotoperiodo-e-fotossensibilidade-na-cultura-da-soja" target="_blank" class="link-fontes">2. BASF Agriculture - Fotoperíodo e fotossensibilidade na cultura da soja</a>
                     </p>

                </div>
            `
        }
        div_mensagem.innerHTML = mensagem
    }

    function limparCampos() {
        ipt_area.value = ""
        ipt_sacas.value = ""
        ipt_preco.value = ""
        div_mensagem.innerHTML = ''
    }
</script>
