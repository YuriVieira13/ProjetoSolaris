<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./style.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <title>Document</title>
    </head>
    <body>
        <div class="div_container">
            <aside class="sidebar">
                <img
                    src="./assets/imgs/logo.png"
                    alt="Logo solaris"
                    class="img_logo"
                />

                <div class="div_barra"></div>

                <nav class="navbar">
                    <h4 class="nomeUsuario">SELECIONE A ÁREA DESEJADA</h4>
                    
                    <a href="./Area1/index.html" class="btn_sidebar">Área de Plantio 1</a>

                    <a href="./Area2/index.html" class="btn_sidebar">Área de Plantio 2</a>
                </nav>

                <div class="div_barra"></div>
                <div class="div_btnCadastro">

                <a
                href="../Protótipos/Protótipo_Solaris_CSS/public/Cadastro.html"
                class="btn_sidebar btn_cadastroSide"
                >Cadastrar Funcionario</a>

            </div>


            </aside>

            



            <div class="main">
                <h4 class="tituloMapa">Clique no mapa na area desejada</h4>
                <a href="./Area1/index.html" class="btn_area area1"></a>

                <a href="./Area2/index.html" class="btn_area area2"></a>

            </div>

  
        </div>
    </body>

    <script>

        /* GRAFICO DE BARRA */

        let mediaMaxima = [900, 1000, 1300, 1200, 1550, 1880, 1564, 1400];  /* Dados mocados que futuramente virão do banco de dados */
        let mediaMinima = [835, 890, 850, 750, 550, 800, 813, 300];         /* Dados mocados que futuramente virão do banco de dados */

        let limiteMaximo = 1500; /* Dados estabelecidos com base nas pesquisas feitas pelo grupo, links no modal */
        let limiteMinimo = 400;  /* Dados estabelecidos com base nas pesquisas feitas pelo grupo, links no modal */

        let meta = 0;           /* Variável que futuramente vai receber um valor via prompt do cliente.*/
        let porcentagemPPFDG = 0; /* Variável que futuramente vai receber uma equação da relação entre as áreas adequadas e o total de áreas.*/

        let quantidadeHectares = 8; /* Variável que recebe a quantidade de hectares da área de plantil, futuramente será via BD.*/

        /* GRAFICO DE PIZZA */

        let acima = 0; /* Variáveis de contagem que serão usadas na produção do gráfico de pizza.*/
        let abaixo = 0;
        let normal = 0;

        function carregarDados() {     /* Carregadar os dados na tela ao iniciar a página */

            let contadorAreasInadequadas = 0;

            /* for utilizado para determinar a quantidade de áreas inadequadas / alertas */
            for (let i = 0; i < quantidadeHectares; i++) {
                if (
                    mediaMaxima[i] > limiteMaximo ||
                    mediaMinima[i] < limiteMinimo
                ) {
                    contadorAreasInadequadas++;    
                }
            }

            qtdAreasInadequadas.innerHTML = `${contadorAreasInadequadas}`;

            /* calculo utilizado para gerar a porcentagem de aproveitamento da área, sendo o total de áreas adquadas dividido pelo total */

            let porcentagemPPFD =
                ((quantidadeHectares - contadorAreasInadequadas) /  
                    quantidadeHectares) *
                100;

            porcentagemPPFDG = porcentagemPPFD;

            if (porcentagemPPFD < meta) {   /* estilizar a cor da porcentagem com base na meta estabelecida via prompt */
                metaPPFD.innerHTML = `<h1 style="color: rgb(255, 0, 0)">${porcentagemPPFD}%</h1>`;
            } else {
                metaPPFD.innerHTML = `<h1 style="color:green">${porcentagemPPFD}%</h1>`;
            }

            metaDesejada.innerHTML = `meta desejada: ${meta}%`;


            /* for que gera o nosso mapa de calor, já com as cores equivalentes */
            for (let i = 0; i < quantidadeHectares; i++) {              
                if (mediaMaxima[i] > limiteMaximo) {
                    gridMapa.innerHTML += `                                <a
                                    href="./areas/area${i + 1}.html"
                                    class="area"
                                    style="background-color: rgb(201, 6, 6)"
                                    >Hectare ${i + 1}</a
                                >`;
                } else if (mediaMinima[i] < limiteMinimo) {
                    gridMapa.innerHTML += `                                <a
                                    href="./areas/area${i + 1}.html"
                                    class="area"
                                    style="background-color: rgb(237, 89, 89)"
                                    >Hectare ${i + 1}</a
                                >`;
                } else {
                    gridMapa.innerHTML += `                                <a
                                    href="./areas/area${i + 1}.html"
                                    class="area"
                                    style="background-color: rgb(104, 197, 76)"
                                    >Hectare ${i + 1}</a
                                >`;
                }

                qtdAlertas.innerHTML = contadorAreasInadequadas;

            }

            /* for para fazer a contagem dos valores que serão utilizados no dado de pizza */
            for (let qtdAreasPizza = 0; qtdAreasPizza < quantidadeHectares; qtdAreasPizza++) {
                    if (mediaMaxima[qtdAreasPizza] > limiteMaximo) {
                        acima++;
                    } else if (mediaMinima[qtdAreasPizza] < limiteMinimo) {
                        abaixo++;
                    } else {
                        normal++;
                    }
                }
        }

        window.onload = carregarDados();

        const grafLinha = document.getElementById("graficoLinha");

        new Chart(grafLinha, {
            type: "bar",
            data: {
                labels: [
                    "Hectare 1",
                    "Hectare 2",
                    "Hectare 3",
                    "Hectare 4",
                    "Hectare 5",
                    "Hectare 6",
                    "Hectare 7",
                    "Hectare 8",
                ],
                datasets: [
                    {
                        label: "Média do PPFD Máximo",
                        data: [
                            mediaMaxima[0],
                            mediaMaxima[1],
                            mediaMaxima[2],
                            mediaMaxima[3],
                            mediaMaxima[4],
                            mediaMaxima[5],
                            mediaMaxima[6],
                            mediaMaxima[7],
                        ],
                        backgroundColor: "#3b6cb7",
                    },
                    {
                        label: "Média do PPFD Mínimo",
                        data: [
                            mediaMinima[0],
                            mediaMinima[1],
                            mediaMinima[2],
                            mediaMinima[3],
                            mediaMinima[4],
                            mediaMinima[5],
                            mediaMinima[6],
                            mediaMinima[7],
                        ],
                        backgroundColor: "#e67e22",
                    },
                    {
                        label: "Limite Superior",
                        data: [
                            limiteMaximo,
                            limiteMaximo,
                            limiteMaximo,
                            limiteMaximo,
                            limiteMaximo,
                            limiteMaximo,
                            limiteMaximo,
                            limiteMaximo,
                            limiteMaximo,
                        ],
                        type: "line",
                        borderColor: "#888",
                        borderWidth: 2,
                        pointRadius: 0,
                    },
                    {
                        label: "Limite infeirior",
                        data: [
                            limiteMinimo,
                            limiteMinimo,
                            limiteMinimo,
                            limiteMinimo,
                            limiteMinimo,
                            limiteMinimo,
                            limiteMinimo,
                            limiteMinimo,
                        ],
                        type: "line",
                        borderColor: "#f1c40f",
                        borderWidth: 2,
                        pointRadius: 0,
                    },
                ],
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: "bottom",
                    },
                    title: {
                        display: true,
                        text: "Média Semanal de incidência solar (PPFD) por Hectare",
                    },
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: "PPFD",
                        },
                    },
                },
            },
        });

        /* GRAFICO DE PIZZA */

        const grafPizza = document.getElementById("graficoPizza");

        new Chart(grafPizza, {
            type: "pie",
            data: {
                labels: ["Acima da limite", "Adequado", "Abaixo do limite"],
                datasets: [
                    {
                        data: [acima, normal, abaixo],
                        backgroundColor: [
                            "rgb(201, 6, 6)",
                            "rgb(104, 197, 76)",
                            "rgb(237, 89, 89)",
                        ],
                    },
                ],
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: "bottom",
                    },
                    title: {
                        display: true,
                        text: "Controle das Hectare",
                    },
                },
            },
        });

        /* Função que deixa a opção do cliente estipular a meta adequada para ele da produtividade desejada */

        function mudarMeta() {
            let metaAtual = prompt("Digite a nova meta desejada");
            meta = metaAtual;

            if (porcentagemPPFDG < meta) {
                metaPPFD.innerHTML = `<h1 style="color: rgb(255, 0, 0)">${porcentagemPPFDG}%</h1>`;
            } else {
                metaPPFD.innerHTML = `<h1 style="color:green">${porcentagemPPFDG}%</h1>`;
            }

            metaDesejada.innerHTML = `meta desejada: ${meta}%`;
        }

        function SobrePFFD() {
            document.getElementById("modal").style.display = "flex";

            tituloModal.innerHTML = "O que é o PPFD";
            textoModal.innerHTML =
                `Traduzindo do inglês, PPFD significa 'Densidade de Fluxo de Fótons Fotossintéticos' De forma simples, é a medida da intensidade da luz que realmente pode ser utilizada pelas plantas no processo de fotossíntese. Ou seja, indica quanta “luz útil” está disponível para o desenvolvimento da planta. <br> <br>
                
                Saiba mais: <a href="https://masterplants.com.br/o-que-e-dli-e-ppfd-qual-a-sua-relacao-e-importancia-em-cultivos/"> Mais detalhes sobre o PPFD </a>`;
        }

        function sobreMeta() {
            document.getElementById("modal").style.display = "flex";
            tituloModal.innerHTML = "O que as metas siginicam";
            textoModal.innerHTML = `O PPFD representa a quantidade de luz útil que a soja recebe para realizar a fotossíntese.
            Quando está abaixo do ideal, a planta cresce menos e produz pouca energia.
            Na faixa adequada, há desenvolvimento saudável e boa produtividade.
            Já acima do limite, o excesso de luz causa estresse e prejudica o funcionamento da planta.
            Em casos extremos, pode ocorrer fotoinibição e até “queima” das folhas. <br> <br>
            
            Fontes: <br> <a href="https://www.mdpi.com/2073-4395/15/5/1037"> Artigo 1 (Impactos da quantidade abaixo de 400 PPFD) </a>
            <br> <a href="https://www.sciencedirect.com/science/article/abs/pii/037842909390053P"> Artigo 2 (Ineficiência acima do limite) </a>
            <br> <a href="    https://www.mdpi.com/2073-4395/9/8/428"> Artigo 3 (Testes na fase adquada) </a>
            
            `;
        }

        function fecharModal() {
            document.getElementById("modal").style.display = "none";
        }
    </script>
</html>
