<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./style.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <title>Document</title>
    </head>
    <body>
        <div class="div_container">
            <aside class="sidebar">
                <img
                    src="./assets/imgs/logo.png"
                    alt="Logo solaris"
                    class="img_logo"
                />

                <div class="div_barra"></div>

                <nav class="navbar">
                    <button class="btn_sidebar">Áreas</button>

                    <button class="btn_sidebar">Sensores</button>

                    <button class="btn_sidebar">Relatorios</button>

                    <button class="btn_sidebar">Alertas</button>
                </nav>

                <div class="div_barra"></div>

                <h4 class="titulo">Configurações da conta</h4>

                <img src="./assets/imgs/Pessoa.png" class="img_perfil" />
                <h4 class="nomeUsuario">Guilherme Cunha</h4>
                <button class="btn_sidebar">Configurações</button>
            </aside>

            <div class="main">
                <section>
                    <div class="div_cards">
                        <div class="div_card">
                            <span>Áreas(total:8)</span>
                            <h1>8</h1>
                            <p>Monitoradas!</p>
                        </div>

                        <div class="div_card">
                            <span>Áreas inadequadas</span>
                            <h1>2</h1>
                            <p>Para o plantil</p>
                        </div>

                        <div class="div_card">
                            <span>Eficiencia do PPFD</span>
                            <h1>75%</h1>
                            <p>Da área</p>
                        </div>

                        <div class="div_card">
                            <span>Alertas</span>
                            <h1>2</h1>
                            <p>Não vistos</p>
                        </div>
                    </div>


                    <section class="conteudo">
                        <div class="box grande">
                            <canvas id="graficoLinha"></canvas>
                        </div>
                    
                        <div class="box mapa">
                            <h3>Mapa de Calor da Propriedade</h3>
                        
                        <div class="grid-mapa">
                                <div class="area">Área 6</div>
                                <div class="area">Área 1</div>
                                <div class="area">Área 2</div>
                                <div class="area">Área 5</div>
                        
                                <div class="area">Área 7</div>
                                <div class="area">Área 3</div>
                                <div class="area">Área 4</div>
                                <div class="area">Área 8</div>
                            </div>
                        </div>
                    
                        <div class="box pequeno">
                            <canvas id="graficoPizza"></canvas>
                        </div>
                    </section>
                </section>
                
            </div>
        </div>
    </body>

    <script>

        /* GRAFICO DE LINHA */

        const grafLinha = document.getElementById('graficoLinha')

        new Chart(grafLinha, {
            type: 'bar',
            data: {
                labels: [
                    'Sensor 1','Sensor 2','Sensor 3','Sensor 4',
                    'Sensor 5','Sensor 6','Sensor 7','Sensor 8'
                ],
                datasets: [
                    {
                        label: 'Média do PPFD Máximo',
                        data: [1822,1700,1800,1700,1550,1880,1864,1400],
                        backgroundColor: '#3b6cb7'
                    },
                    {
                        label: 'Média do PPFD Mínimo',
                        data: [835,890,850,750,550,800,813,500],
                        backgroundColor: '#e67e22'
                    },
                    {
                        label: 'Meta',
                        data: [1700,1700,1700,1700,1700,1700,1700,1700],
                        type: 'line',
                        borderColor: '#888',
                        borderWidth: 2,
                        pointRadius: 0
                    },
                    {
                        label: 'Limite',
                        data: [600,600,600,600,600,600,600,600],
                        type: 'line',
                        borderColor: '#f1c40f',
                        borderWidth: 2,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    },
                    title: {
                        display: true,
                        text: 'Média Semanal de incidência solar (PPFD) por Sensor'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'PPFD'
                        }
                    }
                }
            }
        });



        /* GRAFICO DE PIZZA */

        const grafPizza = document.getElementById('graficoPizza')

        new Chart(grafPizza, {
    type: 'pie',
    data: {
        labels: [
            'Acima da meta',
            'Normal',
            'Abaixo do limite',
        ],
        datasets: [{
            data: [4, 2, 2],
            backgroundColor: [
                '#2ecc71',
                '#f1c40f', 
                '#e74c3c'  
            ]
        }]
    },
    options: {
        maintainAspectRatio: false,
        plugins: {
            legend: {
                position: 'bottom'
            },
            title: {
                display: true,
                text: 'Controle das Áreas'
            }
        }
    }
});
        </script>


</html>
