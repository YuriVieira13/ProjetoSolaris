<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./style.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <title>Document</title>
    </head>
    <body>
        <div class="div_container">
            <aside class="sidebar">
                <img
                    src="./assets/imgs/logo.png"
                    alt="Logo solaris"
                    class="img_logo"
                />

                <div class="div_barra"></div>

                <nav class="navbar">
                    <button class="btn_sidebar">Áreas</button>

                    <button class="btn_sidebar">Sensores</button>

                    <button class="btn_sidebar">Relatorios</button>

                    <button class="btn_sidebar">Alertas</button>
                </nav>

                <div class="div_barra"></div>

                <h4 class="titulo">Configurações da conta</h4>

                <img src="./assets/imgs/Pessoa.png" class="img_perfil" />
                <h4 class="nomeUsuario">Guilherme Cunha</h4>
                <button class="btn_sidebar">Configurações</button>
            </aside>

            <div class="main">
                <section>
                    <div class="div_cards">
                        <div class="div_card">
                            <span>Áreas(total:8)</span>
                            <h1>8</h1>
                            <p>Monitoradas!</p>
                        </div>

                        <div class="div_card">
                            <span>Áreas inadequadas</span>
                            <h1>2</h1>
                            <p>Para o plantil</p>
                        </div>

                        <div class="div_card">
                            <span>Eficiencia do PPFD</span>
                            <h1>75%</h1>
                            <p>Da área</p>
                        </div>

                        <div class="div_card">
                            <span>Alertas</span>
                            <h1>2</h1>
                            <p>Não vistos</p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </body>
</html>
